name = "celestrak-orbit-lab-pro"
main = "worker/index.ts"
compatibility_date = "2025-04-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "SOCRATES_BUCKET"
bucket_name = "celtrak-socrates-cache"

[triggers]
crons = ["37 */2 * * *"]

[vars]
CACHE_TTL_SECONDS = "900"
CATALOG_CACHE_TTL_SECONDS = "9000"
